<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — DESPACHANTES CONSULTAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-gray-50">

  <!-- Topbar -->
  <div class="topbar text-sm py-2 px-4">
    <div class="container mx-auto flex flex-wrap justify-between items-center">
      <div class="font-semibold">Consultas veiculares rápidas e seguras</div>
      <div class="flex gap-4 items-center text-xs md:text-sm">
        <a href="tel:(22) 99995-1574" class="hover:text-orange-400">📞 (22) 99995-1574</a>
        <a href="https://wa.me/5522999951574" class="hover:text-orange-400">💬 WhatsApp</a>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-4">
      <nav class="flex justify-between items-center">
        <div class="text-2xl font-bold text-blue-900">
          <a href="/">DESPACHANTES CONSULTAS</a>
        </div>
        <div class="flex gap-3">
          <a href="/entrar" class="text-sm font-semibold text-orange-500">Entrar</a>
          <a href="/cadastrar" class="btn-primary text-sm">Criar Conta</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md">

      <!-- Card -->
      <div class="bg-white rounded-xl shadow-lg p-8">
        <!-- Logo e título -->
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-blue-900 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-blue-900">Entrar na Plataforma</h1>
          <p class="text-gray-500 text-sm mt-1">Acesse sua conta com e-mail ou CPF/CNPJ</p>
        </div>

        <!-- Alerta de erro -->
        <div id="alert-error"
          class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-6 text-sm flex items-start gap-2">
          <span class="text-red-500 mt-0.5">⚠️</span>
          <span id="alert-error-msg"></span>
        </div>

        <!-- Formulário -->
        <form id="login-form" novalidate>
          <!-- Identificador -->
          <div class="mb-4">
            <label for="identifier" class="block text-sm font-semibold text-gray-700 mb-2">
              E-mail ou CPF/CNPJ
            </label>
            <input
              id="identifier"
              name="identifier"
              type="text"
              autocomplete="username"
              placeholder="seu@email.com ou 000.000.000-00"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm
                     focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                     transition"
              required
            >
          </div>

          <!-- Senha -->
          <div class="mb-2">
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
              Senha
            </label>
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="••••••••"
                class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm
                       focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                       transition pr-12"
                required
              >
              <button
                type="button"
                id="toggle-password"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                tabindex="-1"
              >
                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Esqueci senha -->
          <div class="text-right mb-6">
            <a href="#" class="text-xs text-blue-700 hover:text-orange-500 font-medium">
              Esqueci minha senha
            </a>
          </div>

          <!-- Botão -->
          <button
            id="btn-submit"
            type="submit"
            class="w-full btn-primary text-center flex items-center justify-center gap-2"
          >
            <span id="btn-text">Entrar</span>
            <svg id="btn-spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
            </svg>
          </button>
        </form>

        <!-- Divisor -->
        <div class="flex items-center gap-3 my-6">
          <div class="flex-1 border-t border-gray-200"></div>
          <span class="text-xs text-gray-400">ou</span>
          <div class="flex-1 border-t border-gray-200"></div>
        </div>

        <!-- Link para cadastro -->
        <div class="text-center">
          <p class="text-sm text-gray-600">
            Ainda não tem conta?
            <a href="/cadastrar" class="text-orange-500 font-semibold hover:text-orange-600">
              Criar conta grátis →
            </a>
          </p>
        </div>
      </div>

      <!-- Info de segurança -->
      <p class="text-center text-xs text-gray-400 mt-4">
        🔒 Conexão segura — seus dados estão protegidos
      </p>
    </div>
  </main>

  <!-- WhatsApp flutuante -->
  <a href="https://wa.me/5522999951574" class="whatsapp-float" target="_blank" aria-label="WhatsApp">
    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </a>

  <script>
    // ── Toggle senha ──────────────────────────────────────────────────────────
    const toggleBtn = document.getElementById('toggle-password');
    const pwdInput  = document.getElementById('password');
    toggleBtn.addEventListener('click', () => {
      const isText = pwdInput.type === 'text';
      pwdInput.type = isText ? 'password' : 'text';
      document.getElementById('eye-icon').innerHTML = isText
        ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>`
        : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
             d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7
                a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878
                l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59
                m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0
                01-4.132 5.411m0 0L21 21"/>`;
    });

    // ── Formatação automática de CPF/CNPJ ────────────────────────────────────
    const identifierInput = document.getElementById('identifier');
    identifierInput.addEventListener('input', function () {
      const val = this.value;
      if (val.includes('@')) return; // é e-mail, não formatar
      const digits = val.replace(/\D/g, '');
      if (digits.length === 0) return;
      let formatted = digits;
      if (digits.length <= 11) {
        formatted = digits
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d)/, '$1.$2')
          .replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      } else {
        formatted = digits
          .replace(/^(\d{2})(\d)/, '$1.$2')
          .replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3')
          .replace(/\.(\d{3})(\d)/, '.$1/$2')
          .replace(/(\d{4})(\d)/, '$1-$2');
      }
      this.value = formatted;
    });

    // ── Envio do formulário ───────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value;

      if (!identifier || !password) {
        showError('Preencha todos os campos.');
        return;
      }

      setLoading(true);
      hideError();

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Erro ao entrar. Tente novamente.');
          return;
        }

        // Redirecionar para painel
        window.location.href = '/painel';
      } catch {
        showError('Falha na conexão. Verifique sua internet e tente novamente.');
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      document.getElementById('btn-submit').disabled = on;
      document.getElementById('btn-text').textContent = on ? 'Entrando...' : 'Entrar';
      document.getElementById('btn-spinner').classList.toggle('hidden', !on);
    }

    function showError(msg) {
      document.getElementById('alert-error-msg').textContent = msg;
      document.getElementById('alert-error').classList.remove('hidden');
    }

    function hideError() {
      document.getElementById('alert-error').classList.add('hidden');
    }
  </script>
</body>
</html>
